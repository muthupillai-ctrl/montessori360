# ── Redirect HTTP → HTTPS ──────────────────────────────────────────────────────
server {
    listen 80;
    server_name yourschool.com www.yourschool.com;
    return 301 https://yourschool.com$request_uri;
}

# ── Main HTTPS server ──────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name yourschool.com;

    # SSL — issued by Certbot (run: certbot --nginx -d yourschool.com)
    ssl_certificate     /etc/letsencrypt/live/yourschool.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourschool.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── API — proxy to Node.js ─────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ── Angular frontend ───────────────────────────────────────────────────────
    root /var/www/montessori360;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed assets forever
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache index.html (Angular entry point)
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin" always;

    client_max_body_size 20m;
}
