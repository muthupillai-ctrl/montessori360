# ── Redirect HTTP → HTTPS (main domain + all subdomains) ───────────────────────
server {
    listen 80;
    server_name ahamsys.com *.ahamsys.com;
    return 301 https://$host$request_uri;
}

# ── Main domain: ahamsys.com ────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name ahamsys.com www.ahamsys.com;

    ssl_certificate     /etc/letsencrypt/live/ahamsys.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ahamsys.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    root /var/www/montessori360;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-store";
    }

    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin" always;

    client_max_body_size 20m;
}

# ── Wildcard subdomains: *.ahamsys.com (school portals) ────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name *.ahamsys.com;

    # Wildcard cert — must cover *.ahamsys.com
    ssl_certificate     /etc/letsencrypt/live/ahamsys.com/fullchain.pem;
